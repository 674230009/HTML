<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FEF3FF;
            line-height: 1.5;
            letter-spacing: 1px;
        }

        .container{
            max-width: 1200px;
            width: 100%;

            margin: 0 auto;
        }

        .card{
            background-image:url(../photo/Login.png);
            width: 390px;
            height: 844px;
            margin: auto;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .image{
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 70px;
        }

        

















        .btn-on{
            background-color: rgb(255, 255, 255);
            border-radius: 10px;
            font-size: 24px;
            text-align: center;

            padding: 8px 16px;

        }
        .btn{
            display: grid;
            grid-template-columns: 1fr ;
            gap: 20px;

            margin: 38px 16px;
        }
    </style>
</head>




<!-- ============================================================================================================== -->
<body>
    <div class="container"> 
        <div class="card"> 
                <div class="image">
                    <img src="photo/LOGO.png" alt="Photo">
                </div>

                <div class="image-login">
                    <img src="photo/LOGIN (1).png" alt="Photo">
                </div>


                <div class="btn">
                    <div class="btn-on">
                        <b>Login with facebook</b>
                    </div>

                    <div class="btn-on">
                        <b>Login with google</b>
                    </div>
                </div>
        </div>
    </div>
</body>
</html>
